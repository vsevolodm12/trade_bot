<div class="bg-white rounded-2xl mx-4 p-5" id="card-{{ a.id }}">

  <div class="flex items-center gap-2 mb-1">
    <span class="text-base font-bold text-ink">{{ a.ticker }}</span>
    <span class="text-[11px] font-medium text-faint bg-surface px-2 py-0.5 rounded-full">{{ a.exchange }}</span>
  </div>
  <p class="text-sm text-faint mb-3 truncate">{{ a.company_name }}</p>

  {% if a.current_price %}
    <p class="text-sm text-faint mb-4">
      Сейчас: <span class="text-ink font-semibold">{{ a.current_fmt }}</span>
      &nbsp;·&nbsp; Цель: <span class="text-ink font-semibold">{{ a.dir_label }} {{ a.target_fmt }}</span>
    </p>
  {% endif %}

  <form hx-put="/alerts/{{ a.id }}/target"
        hx-target="#card-{{ a.id }}"
        hx-swap="outerHTML"
        hx-encoding="application/x-www-form-urlencoded"
        class="space-y-3">

    <div>
      <label class="text-[11px] font-medium text-[#8E8E93] uppercase tracking-[0.05em] block mb-1.5">
        Направление
      </label>
      <div class="flex gap-2" id="dir-wrap-{{ a.id }}">
        <label class="dir-btn flex-1 flex items-center justify-center py-2.5 rounded-xl border cursor-pointer transition-colors"
               data-value="above"
               data-active-cls="border-green-500 bg-green-50 text-green-600">
          <input type="radio" name="direction" value="above" class="sr-only"
                 {% if a.direction == 'above' %}checked{% endif %}>
          <span class="text-sm font-semibold">▲ Рост</span>
        </label>
        <label class="dir-btn flex-1 flex items-center justify-center py-2.5 rounded-xl border cursor-pointer transition-colors"
               data-value="below"
               data-active-cls="border-red-500 bg-red-50 text-red-600">
          <input type="radio" name="direction" value="below" class="sr-only"
                 {% if a.direction == 'below' %}checked{% endif %}>
          <span class="text-sm font-semibold">▼ Падение</span>
        </label>
      </div>
      <script>
        (function() {
          var wrap = document.getElementById('dir-wrap-{{ a.id }}');
          var inactive = 'border-line bg-surface text-faint';
          function update() {
            wrap.querySelectorAll('.dir-btn').forEach(function(lbl) {
              var radio = lbl.querySelector('input[type=radio]');
              var active = lbl.dataset.activeCls;
              if (radio.checked) {
                lbl.className = lbl.className.replace(inactive, '').trim() + ' ' + active;
              } else {
                active.split(' ').forEach(function(c) { lbl.classList.remove(c); });
                inactive.split(' ').forEach(function(c) { lbl.classList.add(c); });
              }
            });
          }
          update();
          wrap.querySelectorAll('input[type=radio]').forEach(function(r) {
            r.addEventListener('change', update);
          });
        })();
      </script>
    </div>

    <div>
      <label class="text-[11px] font-medium text-[#8E8E93] uppercase tracking-[0.05em]">
        Целевая цена ({{ a.currency }})
      </label>
      <input type="number"
             name="target_price"
             value="{{ a.target_price }}"
             step="0.01" min="0.01" autofocus
             style="font-family: inherit"
             class="w-full mt-1.5 px-4 py-3 rounded-xl border border-line bg-surface text-ink text-sm outline-none focus:border-accent transition-colors">
    </div>

    <div class="flex gap-2">
      <button type="submit"
              class="flex-1 py-3 rounded-xl bg-ink text-white text-sm font-semibold transition-opacity active:opacity-70">
        Сохранить
      </button>
      <button type="button"
              class="flex-1 py-3 rounded-xl bg-surface text-ink text-sm font-semibold transition-opacity active:opacity-70"
              hx-get="/partials/alerts/{{ a.id }}"
              hx-target="#card-{{ a.id }}"
              hx-swap="outerHTML">
        Отмена
      </button>
    </div>

  </form>
</div>
